<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artcraft Store - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header"></div>
<main>

<section class="hero">
    <div class="container">
        <h1>Welcome to Artcraft Store</h1>
        <p>Discover unique handmade art and crafts crafted with passion and creativity</p>
        <a href="products.html" class="btn">Explore Products</a>
    </div>
</section>

<section class="section">
    <div class="container">
        <h2 class="section-title">Featured Products</h2>
        <div class="products-grid" id="featured-products"></div>
    </div>
</section>

<section class="section" style="background: #fff;">
    <div class="container">
        <h2 class="section-title">Shop by Category</h2>
        <div class="products-grid" id="category-grid"></div>
    </div>
</section>

</main>
<div id="footer"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/script.js"></script>
<script>
$(document).ready(function() {
    $.getJSON('api/products.php?featured=1', function(products) {
        var html = '';
        $.each(products, function(i, p) {
            html += '<div class="product-card">' +
                '<img src="uploads/' + p.image + '" alt="' + p.name + '" class="product-img" onerror="this.src=\'https://placehold.co/300x220?text=Art\'">' +
                '<div class="product-info">' +
                '<h3>' + p.name + '</h3>' +
                '<div class="category">' + (p.category_name || 'General') + '</div>' +
                '<div class="price">₹' + parseFloat(p.price).toFixed(2) + '</div>' +
                '<button class="btn-add-cart" data-id="' + p.id + '">Add to Cart</button>' +
                '</div></div>';
        });
        $('#featured-products').html(html);
    });

    $.getJSON('api/categories.php', function(cats) {
        var html = '';
        $.each(cats, function(i, c) {
            html += '<div class="product-card" style="cursor:pointer;" onclick="window.location=\'products.html?category=' + c.id + '\'">' +
                '<div class="product-info" style="text-align:center;padding:40px 20px;">' +
                '<h3>' + c.name + '</h3>' +
                '<p style="color:#888;margin-top:8px;">Browse Collection</p>' +
                '</div></div>';
        });
        $('#category-grid').html(html);
    });
});
</script>
</body>
</html>
